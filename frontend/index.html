<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Autopilot — WebCorp · The Living Route</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wdth,wght@0,62..125,100..900&family=Atkinson+Hyperlegible+Next:wght@200..800&family=Atkinson+Hyperlegible:wght@400;700&family=Spline+Sans+Mono:wght@300..700&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════════════
   THE LIVING ROUTE — cartographic light theme
   ink petrol · safety-orange agent · hazard-stripe gate
   ════════════════════════════════════════════════════════════ */
:root{
  --chalk:#F3F7F6; --chalk2:#EDF3F1; --card:#FFFFFF; --cardTint:#FAFCFB;
  --ink:#0C2430; --ink2:#37505B; --ink3:#66808A; --ink4:#9FB3BA;
  --line:#DEE8E6; --lineHi:#C6D6D3; --dot:#0C243014;
  --signal:#F4501E; --signalInk:#A03A10; --signalSoft:#FDEAE2; --signalGlow:#F4501E66;
  --verified:#0C7A57; --verifiedSoft:#E2F3EC;
  --critical:#C0322B; --criticalSoft:#FAE8E6;
  --display:'Archivo',-apple-system,sans-serif;
  --body:'Atkinson Hyperlegible Next','Atkinson Hyperlegible',-apple-system,sans-serif;
  --mono:'Spline Sans Mono',ui-monospace,monospace;
  --r-card:20px; --r-btn:12px;
  --shadow-card:0 1px 3px rgba(12,36,48,.05),0 18px 40px -30px rgba(12,36,48,.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  min-height:100vh;background:var(--chalk);color:var(--ink);
  font-family:var(--body);font-size:14px;
  background-image:radial-gradient(var(--dot) 1px, transparent 1.4px);
  background-size:26px 26px;
}
::selection{background:var(--signalSoft);color:var(--signalInk)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--lineHi);border-radius:99px}
button{font-family:var(--body)}
button:focus-visible,[tabindex]:focus-visible,textarea:focus-visible{outline:2.5px solid var(--signal);outline-offset:2px;border-radius:6px}
textarea::placeholder{color:var(--ink4)}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
}

/* ── signage vocabulary ── */
.signage{font-family:var(--display);font-stretch:118%;font-weight:750;text-transform:uppercase;letter-spacing:.16em}
.mono{font-family:var(--mono)}

/* ── topbar ── */
.topbar{display:flex;align-items:center;gap:16px;padding:14px 30px;position:sticky;top:0;z-index:40;
  background:color-mix(in srgb, var(--chalk) 86%, #fff);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px}
.brand svg{display:block}
.wordmark b{font-family:var(--display);font-stretch:122%;font-size:15px;font-weight:820;letter-spacing:.12em;display:block;line-height:1.05;text-transform:uppercase}
.wordmark small{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--ink3);text-transform:uppercase}
.status-pill{margin-left:14px;display:inline-flex;align-items:center;gap:9px;padding:7px 13px;border-radius:99px;
  background:var(--card);border:1px solid var(--line);font-size:11.5px;font-weight:600;color:var(--ink2)}
.status-pill .sd{position:relative;width:8px;height:8px;flex:none}
.status-pill .sd i{position:absolute;inset:0;border-radius:99px;background:var(--verified);transition:background .3s}
.status-pill .sd::after{content:"";position:absolute;inset:0;border-radius:99px;background:inherit;
  box-shadow:0 0 0 0 currentColor}
.status-pill.reasoning .sd i{background:var(--signal)}
.status-pill.waiting .sd i{background:var(--signal)}
.status-pill.waiting{border-color:#F4501E55;background:var(--signalSoft);color:var(--signalInk)}
@keyframes sdping{0%{box-shadow:0 0 0 0 currentColor;opacity:.55}100%{box-shadow:0 0 0 7px currentColor;opacity:0}}
.status-pill .sd i::after{content:"";position:absolute;inset:0;border-radius:99px;color:inherit;animation:sdping 2.1s ease-out infinite;background:transparent;box-shadow:0 0 0 0 var(--verified)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.next-scan{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink3)}
.next-scan svg{width:13px;height:13px}
.avatar{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:var(--ink);
  color:#fff;font-size:10.5px;font-weight:750;font-family:var(--display);letter-spacing:.05em}

/* ── the route map (nav + centerpiece) ── */
.map-band{position:sticky;top:59px;z-index:35;border-bottom:1px solid var(--line);
  background:color-mix(in srgb, var(--chalk) 90%, #fff);backdrop-filter:blur(8px)}
.map-scroll{overflow-x:auto;overflow-y:hidden}
.map-scroll::-webkit-scrollbar{height:5px}
#routemap{display:block;width:100%;min-width:860px;max-width:1280px;margin:0 auto;height:auto}
/* rails */
.rail{fill:none;stroke:var(--lineHi);stroke-width:2.5;stroke-linecap:round}
.rail.spur,.rail.loop{stroke-dasharray:2 7;stroke-width:2}
.rail.drawable{transition:stroke-dashoffset 1.5s cubic-bezier(.3,.7,.2,1)}
/* nodes */
.node{cursor:pointer}
.node .halo{fill:transparent;stroke:transparent;stroke-width:2.5;transition:all .25s}
.node .core{fill:var(--card);stroke:var(--lineHi);stroke-width:2.2;transition:all .25s}
.node .glyph{color:var(--ink3);transition:color .25s}
.node:hover .core{stroke:var(--ink2);transform:translateY(-1.5px)}
.node.active .core{fill:var(--ink);stroke:var(--ink)}
.node.active .glyph{color:#fff}
.node.active .halo{stroke:var(--ink);stroke-opacity:.25}
.node .nlabel{font-family:var(--display);font-stretch:118%;font-weight:700;font-size:10.2px;
  letter-spacing:.15em;fill:var(--ink3);text-transform:uppercase;transition:fill .25s}
.node .ncode{font-family:var(--mono);font-size:8px;letter-spacing:.12em;fill:var(--ink4)}
.node.active .nlabel{fill:var(--ink);font-weight:820}
.node.flash .halo{stroke:var(--signal);animation:haloflash 1.3s ease-in-out infinite}
@keyframes haloflash{0%,100%{stroke-opacity:.85;stroke-width:2.5}50%{stroke-opacity:.15;stroke-width:5}}
.node .pop{transform-origin:center;transform-box:fill-box;opacity:0;transform:scale(.4);
  animation:nodepop .5s cubic-bezier(.2,1.4,.4,1) forwards}
@keyframes nodepop{to{opacity:1;transform:scale(1)}}
.badge-count{font-family:var(--mono);font-weight:600;font-size:9.5px;fill:#fff}
/* pulse = the agent */
#pulse{filter:drop-shadow(0 0 6px var(--signalGlow)) drop-shadow(0 0 14px var(--signalGlow));transition:opacity .3s}
#pulse .pc{fill:var(--signal)}
#pulse .pr{fill:none;stroke:var(--signal);opacity:0}
#pulse.locked .pr{opacity:1;animation:pulsering 1.2s ease-out infinite;transform-origin:center;transform-box:fill-box}
@keyframes pulsering{0%{transform:scale(1);opacity:.8}100%{transform:scale(3.1);opacity:0}}
.maplegend{font-family:var(--mono);font-size:8.5px;letter-spacing:.22em;fill:var(--ink4);text-transform:uppercase}
.lockg{color:var(--ink3)}

/* ── workspace ── */
.workspace{max-width:1020px;margin:0 auto;padding:34px 30px 80px}
.page{display:none}
.page.on{display:block;animation:pagein .45s cubic-bezier(.16,1,.3,1)}
@keyframes pagein{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.kicker{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.kicker .kc{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--signalInk);
  background:var(--signalSoft);padding:3px 8px;border-radius:6px;letter-spacing:.06em}
.kicker .kt{font-family:var(--display);font-stretch:118%;font-size:10.5px;font-weight:750;color:var(--ink3);
  letter-spacing:.18em;text-transform:uppercase}
.kicker .krule{flex:1;height:1px;background:var(--line)}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:22px;margin-bottom:26px;flex-wrap:wrap}
.page-head h1{font-family:var(--display);font-size:35px;font-weight:790;letter-spacing:-.028em;line-height:1.02}
.page-head p{font-size:13.5px;color:var(--ink2);margin-top:10px;max-width:560px;line-height:1.55}
.page-head p b{color:var(--ink);font-weight:700}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);
  box-shadow:var(--shadow-card);opacity:0;transform:translateY(12px);
  animation:cardin .5s cubic-bezier(.16,1,.3,1) forwards}
@keyframes cardin{to{opacity:1;transform:translateY(0)}}
.card.lift{transition:transform .25s,box-shadow .25s}
.card.lift:hover{transform:translateY(-3px);box-shadow:0 26px 52px -32px rgba(12,36,48,.4)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 19px;border-radius:var(--r-btn);
  border:none;cursor:pointer;font-size:13px;font-weight:700;transition:transform .12s,box-shadow .2s}
.btn svg{width:15px;height:15px}
.btn:active{transform:scale(.97)}
.btn-ink{background:var(--ink);color:#fff;box-shadow:0 10px 24px -10px rgba(12,36,48,.55)}
.btn-ink:hover{box-shadow:0 14px 28px -10px rgba(12,36,48,.6)}
.btn-ghost{background:var(--card);border:1.5px solid var(--lineHi);color:var(--ink2)}
.btn-ghost:hover{border-color:var(--ink3)}
.chip{padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:var(--cardTint);
  color:var(--ink2);font-size:11.5px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--ink3);color:var(--ink)}
.ftag{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;font-weight:500;
  color:var(--verified);background:var(--verifiedSoft);padding:3.5px 9px;border-radius:6px;white-space:nowrap}
.ftag i{font-style:italic;font-weight:700}
.snap{font-family:var(--mono);font-size:10.5px;color:var(--ink3);padding:3.5px 9px;border-radius:6px;
  background:var(--cardTint);border:1px solid var(--line);white-space:nowrap}
.hazard{background:repeating-linear-gradient(-45deg,var(--ink) 0 9px,#fff 9px 18px)}
.origen-chip{font-family:var(--mono);font-size:10px;color:var(--ink3);background:var(--cardTint);
  border:1px solid var(--line);border-radius:6px;padding:2.5px 7px;cursor:pointer;transition:all .15s}
.origen-chip:hover{border-color:var(--signal);color:var(--signalInk)}

/* ── PATROL ── */
.patrol-grid{display:grid;grid-template-columns:1.35fr 1fr;gap:16px}
.worst-card{padding:26px;position:relative;overflow:hidden}
.worst-glow{position:absolute;top:-70px;right:-60px;width:250px;height:250px;border-radius:99px;
  background:radial-gradient(circle,var(--criticalSoft),transparent 68%)}
.worst-tag{display:inline-flex;align-items:center;gap:7px;font-family:var(--display);font-stretch:115%;
  font-size:10px;font-weight:780;color:var(--critical);letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px}
.worst-tag svg{width:14px;height:14px}
.worst-num{font-family:var(--display);font-size:62px;font-weight:800;letter-spacing:-.045em;color:var(--ink);line-height:.9}
.worst-pair{font-family:var(--mono);font-size:12.5px;color:var(--ink2);font-weight:500;margin-top:10px}
.worst-math{display:flex;align-items:center;gap:9px;margin-top:9px;font-family:var(--mono);font-size:11px;color:var(--ink3)}
.worst-math s{color:var(--ink4)}
.worst-math .arrow{color:var(--critical)}
.worst-math b{color:var(--critical);font-weight:600}
.worst-foot{margin-top:18px;display:flex;gap:8px;flex-wrap:wrap}
.side-stack{display:flex;flex-direction:column;gap:16px}
.money-card{padding:20px 22px}
.money-v{font-family:var(--display);font-size:32px;font-weight:790;letter-spacing:-.03em;color:var(--critical)}
.money-l{font-size:12px;color:var(--ink2);margin-top:4px;line-height:1.4}
.money-meta{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.speed-card{padding:20px 22px;background:linear-gradient(155deg,var(--signalSoft),var(--card) 70%)}
.speed-l{font-family:var(--display);font-stretch:115%;font-size:9.5px;font-weight:780;color:var(--signalInk);
  letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px}
.speed-row{display:flex;align-items:center;gap:11px}
.speed-row .from{font-family:var(--display);font-size:23px;font-weight:780;color:var(--ink4);text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:#9FB3BA88}
.speed-row .to{font-family:var(--display);font-size:23px;font-weight:790;color:var(--signalInk)}
.speed-row svg{width:17px;height:17px;color:var(--signal)}
.speed-q{font-size:11.5px;color:var(--ink2);margin-top:8px;font-style:italic;line-height:1.45}
.promise-card{padding:18px 22px;margin-top:16px}
.promise-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.promise{display:flex;align-items:center;gap:11px}
.promise .pi{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;flex:none}
.promise .pi svg{width:15px;height:15px}
.promise span{font-size:12px;color:var(--ink2);line-height:1.35}
.coverage-card{padding:16px 22px;margin-top:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.coverage-t{font-family:var(--display);font-stretch:115%;font-size:9.5px;font-weight:780;letter-spacing:.15em;
  color:var(--ink3);text-transform:uppercase;flex:none}
.cov-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;
  padding:4.5px 10px;border-radius:99px;border:1px solid var(--line)}
.cov-chip.full{color:var(--verified);background:var(--verifiedSoft);border-color:#0C7A5733}
.cov-chip.part{color:var(--ink3);background:var(--cardTint)}
.cov-note{font-size:11px;color:var(--ink3);margin-left:auto}

/* ── EVIDENCE ── */
.ev-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.gauge{padding:22px}
.gauge-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.gauge-h b{font-family:var(--display);font-size:14.5px;font-weight:760;letter-spacing:-.01em}
.gauge-n{font-family:var(--mono);font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:99px}
.brow{margin-bottom:12px}
.brow-top{display:flex;justify-content:space-between;margin-bottom:5px}
.brow-top .l{font-size:11px;color:var(--ink3);font-weight:500}
.brow-top .v{font-family:var(--mono);font-size:11.5px;font-weight:600}
.btrack{height:9px;background:var(--cardTint);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bfill{height:100%;border-radius:99px;width:0%;transition:width 1.1s cubic-bezier(.2,.7,.3,1)}
.verdict{display:flex;align-items:center;gap:8px;margin-top:14px;padding:10px 13px;border-radius:12px;
  font-size:11.5px;font-weight:600}
.verdict svg{width:15px;height:15px;flex:none}
.tools-card{margin-top:16px;padding:0;overflow:hidden}
.tools-h{padding:15px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.tools-h b{font-family:var(--display);font-size:13.5px;font-weight:760}
.tools-h span{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink3)}
.tool-row{display:flex;align-items:center;gap:14px;padding:12px 22px}
.tool-row:not(:last-child){border-bottom:1px solid var(--chalk2)}
.tool-name{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink);width:220px;flex:none}
.tool-desc{font-size:11.5px;color:var(--ink2);flex:1}
.tool-lock{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9.5px;font-weight:600;
  color:var(--ink);padding:3px 8px 3px 5px;border-radius:6px;border:1px solid var(--ink);position:relative;overflow:hidden}
.tool-lock::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
  background:repeating-linear-gradient(-45deg,var(--ink) 0 3px,#fff 3px 6px)}
.tool-lock svg{width:10px;height:10px;margin-left:5px}
.ev-foot{margin-top:16px;padding:18px 22px;display:flex;align-items:center;gap:14px;
  background:linear-gradient(155deg,var(--verifiedSoft),var(--card) 75%)}
.ev-foot svg{width:20px;height:20px;color:var(--verified);flex:none}
.ev-foot span{font-size:12.5px;color:var(--ink2);line-height:1.55}

/* ── DISPATCH ── */
.console{padding:22px;margin-bottom:16px;border:1.5px solid var(--line);transition:border-color .3s,box-shadow .3s}
.console.thinking{border-color:var(--signal);box-shadow:0 0 0 4px var(--signalSoft),var(--shadow-card)}
.console-row{display:flex;gap:16px;align-items:flex-start}
.agent-face{position:relative;width:46px;height:46px;flex:none;border-radius:14px;display:grid;place-items:center;
  background:var(--ink);box-shadow:0 10px 22px -8px rgba(12,36,48,.6)}
.agent-face .af-dot{width:11px;height:11px;border-radius:99px;background:var(--signal);
  box-shadow:0 0 10px var(--signalGlow)}
.agent-face.thinking .af-dot{animation:afbreathe 1s ease-in-out infinite}
@keyframes afbreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.45)}}
textarea#q{width:100%;min-height:48px;resize:none;border:none;outline:none;background:transparent;
  font-family:var(--body);font-size:16px;color:var(--ink);line-height:1.45}
.console-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px;flex-wrap:wrap}
.console-chips{display:flex;gap:7px;flex-wrap:wrap}
/* trace */
.trace-card{padding:6px 22px;margin-bottom:16px}
.tstep{display:flex;align-items:center;gap:13px;padding:11px 0;opacity:0;transform:translateX(-8px);
  animation:tracein .35s ease forwards}
@keyframes tracein{to{opacity:1;transform:translateX(0)}}
.tstep:not(:last-child){border-bottom:1px solid var(--chalk2)}
.tstep .ti{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;flex:none;border:1.5px solid}
.tstep .ti svg{width:13px;height:13px}
.tstep .ti.spin svg{animation:tspin 1s linear infinite}
@keyframes tspin{to{transform:rotate(360deg)}}
.tstep .tt{font-size:12.5px;font-weight:600;flex:1}
.tstep .tt small{display:block;font-family:var(--mono);font-size:10px;font-weight:400;color:var(--ink4);margin-top:1px}
.tstep .tms{font-family:var(--mono);font-size:10px;color:var(--ink3)}
/* answer */
.rec-card{padding:0;overflow:hidden}
.rec-h{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.rec-h svg{width:16px;height:16px;color:var(--signal)}
.rec-h b{font-family:var(--display);font-size:14px;font-weight:770}
.rec-h .origen-chip{margin-left:auto}
.rec-b{padding:22px}
.rec-lead{font-size:16.5px;font-weight:650;line-height:1.5;letter-spacing:-.005em;margin-bottom:18px}
.rec-lead .bad{color:var(--critical)}
.rec-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.rec-stat{border-radius:14px;padding:13px 15px;background:var(--cardTint);border:1px solid var(--line)}
.rec-stat .l{font-size:10.5px;color:var(--ink3);font-weight:600}
.rec-stat .v{font-family:var(--display);font-size:25px;font-weight:790;margin-top:3px;letter-spacing:-.02em}
.rec-stat .s{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:3px}
.rec-foot{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.queued-bar{margin-top:14px;display:flex;align-items:center;gap:11px;padding:13px 16px;border-radius:14px;
  background:var(--card);border:1.5px solid var(--signal);position:relative;overflow:hidden;
  opacity:0;animation:cardin .4s ease forwards}
.queued-bar::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;
  background:repeating-linear-gradient(-45deg,var(--signal) 0 6px,#fff 6px 12px)}
.queued-bar svg{width:17px;height:17px;color:var(--signalInk);flex:none;margin-left:6px}
.queued-bar span{font-size:12.5px;font-weight:650;color:var(--ink);flex:1}
.nv-card{padding:22px;border:1.5px dashed var(--lineHi)}
.nv-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:700;
  color:var(--ink);border:1.5px solid var(--ink);padding:4px 10px;border-radius:99px;letter-spacing:.08em;margin-bottom:14px}
.nv-badge svg{width:11px;height:11px}
.nv-lead{font-size:15.5px;font-weight:650;line-height:1.5;margin-bottom:8px}
.nv-body{font-size:12.5px;color:var(--ink2);line-height:1.6}
.empty{padding:44px;text-align:center}
.empty .ei{width:52px;height:52px;border-radius:16px;margin:0 auto 14px;display:grid;place-items:center;
  background:var(--cardTint);border:1px solid var(--line);color:var(--ink3)}

.empty .et{font-size:13.5px;font-weight:600;color:var(--ink2)}
.disp-foot{margin-top:16px;font-size:11.5px;color:var(--ink3);text-align:center;line-height:1.6}

/* ── GATE ── */
.gate-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
.gate-card{padding:0;overflow:visible;border:1.5px solid var(--ink)}
.gate-card.done{border-color:var(--verified)}
.boom-track{position:relative;height:26px;background:var(--verifiedSoft);overflow:visible;border-radius:18px 18px 0 0}
.boom{position:absolute;inset:0;border-radius:18px 18px 0 0;transform-origin:14px 50%;
  transition:transform .75s cubic-bezier(.35,1.25,.4,1),opacity .45s .3s}
.boom.up{transform:rotate(-26deg);opacity:0}
.boom-pivot{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:99px;
  background:var(--ink);z-index:2}
.gate-body{padding:24px}
.gate-badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--display);font-stretch:115%;
  font-size:9.5px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--ink);
  background:var(--cardTint);border:1px solid var(--lineHi);padding:5px 11px;border-radius:99px;margin-bottom:15px}
.gate-badge svg{width:12px;height:12px}
.gate-title{font-family:var(--display);font-size:20px;font-weight:780;line-height:1.25;letter-spacing:-.02em;margin-bottom:16px}
.gate-stats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.gate-stat{flex:1;min-width:110px;background:var(--cardTint);border-radius:12px;padding:11px 13px;border:1px solid var(--line)}
.gate-stat .l{font-size:9.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.gate-stat .v{font-family:var(--mono);font-size:14px;font-weight:600;margin-top:4px}
.gate-actions{display:flex;gap:10px}
.confirm-btn{position:relative;width:100%;padding:13px;border-radius:var(--r-btn);overflow:hidden;cursor:pointer;
  border:1.5px solid var(--signal);background:var(--signalSoft);color:var(--signalInk);font-weight:750;font-size:13px}
.confirm-btn:disabled{cursor:wait}
.confirm-fill{position:absolute;left:0;top:0;bottom:0;background:#F4501E2E;transition:width 1s linear}
.confirm-txt{position:relative}
.gate-hint{font-size:11px;color:var(--ink3);text-align:center;margin-top:12px}
.gate-hint code{font-family:var(--mono);font-size:10px;background:var(--cardTint);padding:1px 5px;border-radius:4px}
.gate-done-w{text-align:center;padding:14px 0 6px}
.gd-ico{width:52px;height:52px;border-radius:16px;background:var(--verified);display:grid;place-items:center;
  margin:0 auto 13px;animation:popin .45s cubic-bezier(.2,1.4,.4,1)}
@keyframes popin{from{transform:scale(.4)}to{transform:scale(1)}}
.gd-ico svg{width:26px;height:26px;color:#fff}
.gd-t{font-family:var(--display);font-size:17px;font-weight:780}
.gd-s{font-size:12.5px;color:var(--ink2);margin-top:5px}
.emit-card{padding:20px 22px}
.emit-t{font-family:var(--display);font-size:13.5px;font-weight:770}
.emit-s{font-size:11.5px;color:var(--ink3);margin:4px 0 14px}
.emit-row{display:flex;align-items:center;gap:12px;padding:11px 0;opacity:.42;transition:opacity .4s}
.emit-row.live{opacity:1}
.emit-row:not(:last-child){border-bottom:1px solid var(--chalk2)}
.emit-ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none;border:1px solid}
.emit-ico svg{width:16px;height:16px}
.emit-n{font-size:13px;font-weight:650}
.emit-d{font-family:var(--mono);font-size:10.5px;color:var(--ink3)}
.clear{padding:48px;text-align:center}

  background:var(--verifiedSoft);color:var(--verified);animation:popin .45s cubic-bezier(.2,1.4,.4,1)}
.clear .ci svg{width:27px;height:27px}
.clear .ct{font-family:var(--display);font-size:18px;font-weight:780}
.clear .cs{font-size:13px;color:var(--ink2);margin-top:6px;max-width:400px;margin-inline:auto;line-height:1.5}

/* ── YIELD ── */

.yh-label{font-family:var(--display);font-stretch:115%;font-size:9.5px;font-weight:800;color:var(--verified);
  letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px}

.yh-mv{font-family:var(--display);font-size:40px;font-weight:790;letter-spacing:-.03em}

.flows{padding:0;overflow:hidden}

.flows-h b{font-family:var(--display);font-size:13.5px;font-weight:770}
.flows-h span{font-family:var(--mono);font-size:10.5px;color:var(--ink3)}

.flow-mid{display:flex;align-items:center;gap:10px;flex:1}

.flow-cf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--verified),#12A374);width:0%;
  transition:width 1s cubic-bezier(.2,.7,.3,1)}
.flow-cp{font-family:var(--mono);font-size:10px;color:var(--ink3)}

/* ── CUSTODY ── */
.ledger-card{padding:0;overflow:hidden}
.ledger-h{padding:15px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.ledger-h .ld{width:8px;height:8px;border-radius:99px;background:var(--verified);flex:none}
.ledger-h b{font-family:var(--display);font-size:13.5px;font-weight:770}
.ledger-h span{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink3)}
.ledger{position:relative}

.lb{flex:1;min-width:0;padding-top:1px}
.lt2{font-size:13px;font-weight:650}
.ld2{font-size:12px;color:var(--ink2);margin-top:2px;line-height:1.45}
.ltech{margin-top:6px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.ltech .plain{font-family:var(--mono);font-size:10px;color:var(--ink4)}
.larts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.art{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;font-weight:600;
  padding:5px 9px;border-radius:7px;border:1px solid}
.art svg{width:11px;height:11px}
.chain-note{padding:10px 22px;background:var(--signalSoft);border-bottom:1px solid #F4501E33;
  font-family:var(--mono);font-size:10.5px;color:var(--signalInk);display:none;align-items:center;gap:8px}
.chain-note.on{display:flex}
.chain-note svg{width:12px;height:12px}

/* ── toast + footer ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,90px);z-index:200;
  background:var(--ink);color:#fff;font-size:12.5px;font-weight:500;padding:12px 20px;border-radius:12px;

#toast.show{transform:translate(-50%,0)}
.lang-sw{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:99px;padding:3px}
.lang-sw button{border:none;background:transparent;cursor:pointer;font-family:var(--mono);font-size:10.5px;
  font-weight:600;color:var(--ink3);padding:4px 9px;border-radius:99px;transition:all .15s}
.lang-sw button.on{background:var(--ink);color:#fff}
.lang-sw button:hover:not(.on){color:var(--ink)}
.gq-card{padding:0;overflow:hidden;margin-bottom:16px}
.gq-h{padding:13px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.gq-h svg{width:15px;height:15px;color:var(--critical)}
.gq-h b{font-family:var(--display);font-size:13px;font-weight:770}
.gq-h span{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink3)}
.gq-row{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;transition:background .15s}
.gq-row:not(:last-child){border-bottom:1px solid var(--chalk2)}
.gq-row:hover{background:var(--cardTint)}
.gq-row.on{background:var(--signalSoft)}
.gq-row.on::before{content:"";width:3.5px;align-self:stretch;background:var(--signal);margin:-11px 0 -11px -20px;border-radius:0}
.gq-idx{font-family:var(--mono);font-size:10px;color:var(--ink4);width:20px;flex:none}
.gq-t{font-size:12.5px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gq-case{font-family:var(--mono);font-size:10px;color:var(--ink3);flex:none}
.explain-card{padding:18px 22px;margin-bottom:16px;background:linear-gradient(155deg,var(--chalk2),var(--card) 70%)}
.explain-t{font-family:var(--display);font-size:13px;font-weight:770;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.explain-t svg{width:15px;height:15px;color:var(--signalInk)}
.explain-b{font-size:12.5px;color:var(--ink2);line-height:1.65}
.explain-b b{color:var(--ink)}
/* ── mapa semáforo LatAm ── */

  padding:7px 11px;border-radius:9px;opacity:0;transition:opacity .12s;white-space:nowrap;z-index:5;
  box-shadow:0 10px 24px -8px rgba(12,36,48,.5)}

.geo-dot{width:9px;height:9px;border-radius:99px;flex:none}
.geo-row b{flex:1;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.geo-demo{font-family:var(--mono);font-size:8.5px;color:var(--ink3);background:var(--chalk2);
  border-radius:4px;padding:1.5px 5px;flex:none}
.geo-empty{color:var(--ink3);font-size:12px;padding:30px 6px;text-align:center}
.geo-foot{padding:10px 22px;border-top:1px solid var(--line);font-family:var(--mono);font-size:9.5px;color:var(--ink4)}
@media(max-width:880px){.geo-body{grid-template-columns:1fr}.geo-detail{border-left:none;border-top:1px solid var(--line)}}
.site-foot{max-width:1020px;margin:0 auto;padding:0 30px 40px;font-family:var(--mono);font-size:10px;
  color:var(--ink4);text-align:center;letter-spacing:.04em}

  .tool-row{flex-wrap:wrap;gap:8px}
  .tool-name{width:100%}
}

/* ── the pulse: one orange dot = where the agent is ── */
const Pulse = (() => {
  let raf = null, mode = "patrol";
  const el = () => document.getElementById("pulse");
  const path = id => document.getElementById(id);
  function setXY(x,y){ el().setAttribute("transform",`translate(${x},${y})`); }
  function ptOn(pid, f){ const p = path(pid); const pt = p.getPointAtLength(p.getTotalLength()*Math.min(Math.max(f,0),1)); return pt; }
  function stop(){ if(raf) cancelAnimationFrame(raf); raf = null; }
  function patrol(){
    stop(); mode = "patrol"; el().classList.remove("locked");
    if(REDUCED){ const pt = ptOn("p-main", frOf(540)); setXY(pt.x,pt.y); return; }
    const pm = path("p-main"), pl = path("p-loop");
    const Lm = pm.getTotalLength(), Ll = pl.getTotalLength(), total = Lm + Ll;
    const speed = total / 16000; // full circulation ≈ 16s
    let last = performance.now(), d = 0;
    (function frame(t){
      d = (d + (t - last) * speed) % total; last = t;
      const pt = d < Lm ? pm.getPointAtLength(d) : pl.getPointAtLength(d - Lm);
      setXY(pt.x, pt.y);
      raf = requestAnimationFrame(frame);
    })(last);
  }
  function travel(fromF, toF, ms, cb){
    stop(); mode = "travel"; el().classList.remove("locked");
    if(REDUCED){ const pt = ptOn("p-main", toF); setXY(pt.x,pt.y); if(cb) cb(); return; }
    const start = performance.now();
    (function frame(t){
      const p = Math.min(1,(t-start)/ms), e = 1 - Math.pow(1-p,3);
      const pt = ptOn("p-main", fromF + (toF-fromF)*e);
      setXY(pt.x, pt.y);
      if(p < 1) raf = requestAnimationFrame(frame);
      else if(cb) cb();
    })(start);
  }
  function lockAt(f){ stop(); mode = "locked"; const pt = ptOn("p-main", f); setXY(pt.x,pt.y); el().classList.add("locked"); }
  function spurTrip(cb){ // out to the external lock and back
    stop(); mode = "spur"; el().classList.remove("locked");
    if(REDUCED){ if(cb) cb(); return; }
    const ps = path("p-spur"); const L = ps.getTotalLength(); const start = performance.now(); const ms = 1500;
    (function frame(t){
      const p = Math.min(1,(t-start)/ms);
      const f = p < .5 ? p*2 : 2-(p*2); // out and back
      const pt = ps.getPointAtLength(L*f); setXY(pt.x,pt.y);
      if(p < 1) raf = requestAnimationFrame(frame); else if(cb) cb();
    })(start);
  }
  return { patrol, travel, lockAt, spurTrip };
})();

function countUp(el, target, prefix, suffix, ms){
  if(REDUCED){ el.textContent = prefix + target.toLocaleString("en-US") + suffix; return; }
  const start = performance.now();
  (function frame(t){
    const p = Math.min(1,(t-start)/ms), e = 1 - Math.pow(1-p,3);
    el.textContent = prefix + Math.round(target*e).toLocaleString("en-US") + suffix;
    if(p < 1) requestAnimationFrame(frame);
  })(start);
}

/* ── mapa semáforo LatAm (página Data) ──
   Semáforo: <50 rojo · 50–65 ámbar · ≥65 verde. Siluetas: Natural Earth 110m
   (frontend/latam.json). Datos: frontend/mapa_semaforo.json — CA alineado al
   snapshot; AR/UY y detalle municipal fuera de GT/SV son demo declarado. */
const GEO = { shapes:null, data:null, sel:"SV", loading:false };
const semColor = ef => ef < 50 ? "#C0322B" : ef < 65 ? "#D97706" : "#0C7A57";
// proyección equirectangular simple sobre el bbox de LatAm
const GEO_B = { lon0:-118, lon1:-34, lat0:-56, lat1:33, W:560, H:600 };
const gx = lon => (lon - GEO_B.lon0) / (GEO_B.lon1 - GEO_B.lon0) * GEO_B.W;
const gy = lat => (GEO_B.lat1 - lat) / (GEO_B.lat1 - GEO_B.lat0) * GEO_B.H;
function geoPath(geom){
  const ring = r => r.map((c,i) => `${i?"L":"M"}${gx(c[0]).toFixed(1)},${gy(c[1]).toFixed(1)}`).join("") + "Z";
  const polys = geom.type === "Polygon" ? [geom.coordinates] : geom.coordinates;
  return polys.map(p => p.map(ring).join("")).join("");
}
async function initGeoMap(){
  const svg = document.getElementById("geo-svg");
  if(!svg) return;
  if(GEO.shapes && GEO.data){ drawGeo(); return; }
  if(GEO.loading) return;
  GEO.loading = true;
  try{
    const [sh, da] = await Promise.all([
      fetch("latam.json").then(r => r.json()),
      fetch("mapa_semaforo.json").then(r => r.json()),
    ]);
    GEO.shapes = sh; GEO.data = da;
    drawGeo();
  }catch(e){
    console.warn("mapa semáforo no disponible:", e.message);
    const card = document.querySelector(".geo-card"); if(card) card.style.display = "none";
  }finally{ GEO.loading = false; }
}
function drawGeo(){
  const svg = document.getElementById("geo-svg");
  if(!svg || !GEO.shapes) return;
  const P = GEO.data.paises;
  const ctx = [], ops = [];
  GEO.shapes.features.forEach(f => {
    const d = geoPath(f.geometry);
    if(f.oper && P[f.id]){
      ops.push(`<path class="geo-op ${GEO.sel===f.id?'sel':''}" d="${d}" fill="${semColor(P[f.id].ef)}" data-id="${f.id}"
        role="button" tabindex="0" aria-label="${P[f.id].nombre} ${P[f.id].ef}%"></path>`);
    } else {
      ctx.push(`<path class="geo-ctx" d="${d}"></path>`);
    }
  });
  svg.innerHTML = ctx.join("") + ops.join("");
  const tip = document.getElementById("geo-tip");
  svg.querySelectorAll(".geo-op").forEach(p => {
    const id = p.dataset.id, c = P[id];
    p.addEventListener("mousemove", e => {
      const box = svg.closest(".geo-map").getBoundingClientRect();
      tip.style.left = (e.clientX - box.left + 14) + "px";
      tip.style.top  = (e.clientY - box.top - 12) + "px";
      tip.innerHTML = `<b>${c.nombre}</b> · ${c.ef}% <span class="mono">n=${c.n.toLocaleString("en-US")}${c.demo?" · "+T("gm_demo"):""}</span>`;
      tip.style.opacity = 1;
    });
    p.addEventListener("mouseleave", () => tip.style.opacity = 0);
    const sel = () => { GEO.sel = id; drawGeo(); };
    p.addEventListener("click", sel);
    p.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); sel(); } });
  });
  geoDetail();
}
function geoDetail(){
  const el = document.getElementById("geo-detail");
  if(!el || !GEO.data) return;
  const c = GEO.data.paises[GEO.sel];
  if(!c){ el.innerHTML = `<div class="geo-empty">${T("gm_pick")}</div>`; return; }
  el.innerHTML = `
    <div class="geo-d-h"><b>${escq(c.nombre)}</b>${c.demo?`<span class="geo-demo">${T("gm_demo")}</span>`:""}</div>
    <div class="geo-d-ef" style="color:${semColor(c.ef)}">${c.ef}%</div>
    <div class="geo-d-n">n=${c.n.toLocaleString("en-US")} ${T("gm_orders")} · snapshot ${GEO.data.snapshot}</div>
    <div class="geo-mun">
      <div class="geo-mun-t">${T("gm_mun")}</div>
      ${(c.municipios||[]).map(m => `
        <div class="geo-row">
          <span class="geo-dot" style="background:${semColor(m.ef)}"></span>
          <b>${escq(m.nombre)}</b>
          ${m.demo?`<span class="geo-demo">${T("gm_demo")}</span>`:""}
          <span class="ef" style="color:${semColor(m.ef)}">${m.ef}%</span>
          <span class="nn">n=${m.n.toLocaleString("en-US")}</span>
        </div>`).join("")}
    </div>`;
}

let vistoAudit = 0;   // cuántas entradas del audit ya pintamos en la traza
async function pasoTraza(){
  // lee el audit real y agrega los eventos nuevos como pasos de la traza
  try{
    const data = await api("/audit?n=15", {timeout:6000});
    const entradas = data.entradas || [];
    if(vistoAudit === 0) vistoAudit = Math.max(0, entradas.length - 1); // solo lo nuevo
    const nuevos = entradas.slice(vistoAudit);
    vistoAudit = entradas.length;
    const c = document.getElementById("trace-card");
    nuevos.forEach(e => {
      const m = EV_META[TIPO_MAP[e.tipo] || "tool"];
      const paso = {icon:m.icon, c:m.c, t:T(m.k), s:e.detalle.slice(0,90), tms:new Date(e.ts).toTimeString().slice(3,8)};
      STATE.trace.push(paso);
      if(c) c.insertAdjacentHTML("beforeend", `
        <div class="tstep">
          <div class="ti" style="color:${paso.c};border-color:${paso.c}44">${ic(paso.icon,13)}</div>
          <div class="tt">${paso.t}<small>${escq(paso.s)}</small></div>
          <span class="tms">${paso.tms}</span>
        </div>`);
    });
  }catch(_){}
}

async function runQuestion(){
  if(STATE.thinking) return;   // no re-entrar mientras razona
  clearFlow();
  const qEl = document.getElementById("q");
  if(qEl) STATE.q = qEl.value;
  const pregunta = (STATE.q || "").trim() || T("p3_ph");
  STATE.lastQ = pregunta;
  STATE.thinking = true; STATE.answered = null; STATE.trace = []; STATE.page = "dispatch";
  vistoAudit = 0;
  setStatus(); refreshMapState(); renderPage();
  // coreografía del pulso: data → tools → agent en bucle mientras razona
  Pulse.travel(frOf(540), frOf(95), 500, () => {
    flowTimers.push(setTimeout(() => Pulse.travel(frOf(95), frOf(300), 900), 600));
    flowTimers.push(setTimeout(() => Pulse.travel(frOf(300), frOf(540), 900), 2400));
  });
  const poll = setInterval(pasoTraza, 2000);
  try{
    const r = await api("/preguntar", {method:"POST", body: JSON.stringify({pregunta, idioma: LANG})});
    await pasoTraza();
    STATE.answered = r;
  }catch(e){
    STATE.answered = {respuesta: T("p3_err") + e.message, fallback: true, tools_usadas: [], pendientes: []};
  }finally{
    clearInterval(poll);
    STATE.thinking = false;
    setStatus(); refreshMapState();
    if(STATE.page === "dispatch") renderPage();
    pendFirma = null; await cargarPendientes(); cargarLedger();
    if(STATE.queue.length){
      Pulse.travel(frOf(540), frOf(765), 800, () => Pulse.lockAt(frOf(765)));
      toast(Tn("t_queued", STATE.queue.length));
    } else {
      Pulse.patrol();
    }
  }
}

    <div class="gate-title">${T("p4_item")} — ${escq(item.caso)}</div>
    <div style="margin:-6px 0 16px;padding:10px 14px;background:var(--cardTint);border:1px solid var(--line);border-radius:10px">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:4px">${T("p4_rat")}</div>
      <div style="font-size:12px;color:var(--ink2);line-height:1.5;font-style:italic">“${escq(item.title)}”</div>
    </div>
    <div class="gate-stats">${stats}</div>
    ${actions}
    <div class="gate-hint">${T("p4_hint")}</div>`;
}
function armGate(){
  STATE.gate = "confirming"; STATE.gateCd = 3;
  const gb = document.getElementById("gate-body");
  if(gb) gb.innerHTML = gateBody(gateSelItem());
  tickGate();
}
function tickGate(){
  clearTimeout(gateTimer);
  if(STATE.gate !== "confirming") return;
  if(STATE.gateCd > 0){
    gateTimer = setTimeout(() => {
      STATE.gateCd--;
      const gb = document.getElementById("gate-body");
      if(gb) gb.innerHTML = gateBody(gateSelItem());
      tickGate();
    }, 1000);
  }
}
async function confirmGate(){
  if(STATE.gateCd > 0) return;
  const item = gateSelItem(); if(!item) return;
  const btn = document.getElementById("confirm-btn");
  if(btn){ btn.disabled = true; btn.querySelector(".confirm-txt").textContent = T("p4_exec"); }
  let res;
  try{
    // el idioma del panel viaja a la remediación: PDF/Excel/correos salen en él
    res = await api(`/pendientes/${item.id}/aprobar`, {method:"POST", body: JSON.stringify({idioma: LANG})});
  }catch(e){
    toast(T("t_errex") + e.message);
    STATE.gate = "pending"; renderPage(); return;
  }
  STATE.gate = "done";
  const boom = document.getElementById("boom"); if(boom) boom.classList.add("up");
  // artefactos REALES en la tarjeta de emisión, con links de descarga
  const rem = res?.resultado?.remediacion;
  setTimeout(() => {
    const gb = document.getElementById("gate-body");
    if(gb) gb.innerHTML = gateBody(item);
    document.getElementById("gate-card")?.classList.add("done");
    const emit = document.querySelector(".emit-card");
    if(emit && rem?.generado){
      const filas = (rem.artefactos || []).map(a => {
        const esX = a.tipo === "excel";
        const col = esX ? "var(--verified)" : "var(--critical)";
        const icn = esX ? "sheet" : "file";
        const nom = esX ? `${T("p4_e2")} · XLSX (${a.ordenes_incluidas || "—"} ${T("p4_orders")})` : `${T("p4_e1")} · ${a.tipo.toUpperCase()}`;
        return `<a class="emit-row live" style="text-decoration:none;color:inherit" href="${API}/artefactos/${encodeURIComponent(a.archivo)}" target="_blank">
          <div class="emit-ico" style="color:${col};border-color:${col}33">${ic(icn,16)}</div>
          <div><div class="emit-n">${escq(nom)}</div><div class="emit-d">${T("p4_dl")}</div></div></a>`;
      }).join("") + (rem.correos || []).map(cor => `
        <a class="emit-row live" style="text-decoration:none;color:inherit" href="${cor.mailto}">
          <div class="emit-ico" style="color:var(--ink2);border-color:var(--lineHi)">${ic("mail",16)}</div>
          <div><div class="emit-n">${T("p4_draft")}${escq(cor.para)}</div><div class="emit-d">${T("p4_mailc")}</div></div></a>`).join("");
      emit.innerHTML = `<div class="emit-t">${T("p4_real")}</div>
        <div class="emit-s">${T("p4_real2")}</div>` + filas;
    } else {
      document.querySelectorAll(".emit-row").forEach((r,i) => setTimeout(() => r.classList.add("live"), i*220));
    }
  }, REDUCED ? 0 : 450);
  cargarLedger();
  setTimeout(() => {
    pendFirma = null;
    STATE.queue = STATE.queue.filter(x => x.id !== item.id);
    STATE.gateSel = 0; STATE.gate = "pending"; STATE.gateCd = 3;
    setStatus(); refreshMapState();
    if(STATE.page === "gate") renderPage();
    Pulse.travel(frOf(765), frOf(950), 600, () =>
      Pulse.travel(frOf(950), frOf(1115), 600, () => STATE.queue.length ? Pulse.lockAt(frOf(765)) : Pulse.patrol()));
    toast(T("t_appr"));
  }, 2600);
}
async function dismissGate(){
  const item = gateSelItem(); if(!item) return;
  try{ await api(`/pendientes/${item.id}/rechazar`, {method:"POST"}); }
  catch(e){ toast(T("t_errdis") + e.message); return; }
  pendFirma = null;
  STATE.queue = STATE.queue.filter(x => x.id !== item.id);
  STATE.gateSel = 0; STATE.gate = "pending"; STATE.gateCd = 3;
  setStatus(); refreshMapState(); renderPage();
  if(!STATE.queue.length) Pulse.patrol();
  cargarLedger();
  toast(T("t_dism"));
}

/* ── 05 YIELD ── */
let PLAN_REAL = null;   // respuesta real de /tools/optimizar_asignacion
const solverLines = () => [T("p5_l1"), T("p5_l2"), T("p5_l3"), T("p5_l4"), T("p5_l5")];
/* explicación en lenguaje simple — para quien no conoce MILP/Wilson */
function yieldExplainer(){
  return `
  <div class="card explain-card" style="animation-delay:.04s">
    <div class="explain-t">${ic("ask",15)} ${T("p5_what")}</div>
    <div class="explain-b">${T("p5_ex")}</div>
  </div>`;
}
function pageYield(){
  if(!STATE.solved){
    return `
    ${kicker("STN 05",T("k5"))}
    <div class="page-head"><div>
      <h1>${T("p5_h")}</h1>
      <p>${T("p5_p")}</p>
    </div></div>
    ${yieldExplainer()}
    <div class="card solve-card" id="solve-card">
      <button class="btn btn-ink" style="margin:6px auto 0" onclick="solveBoard()">${ic("zap",15)} ${T("p5_solve")}</button>
      <div style="font-size:11.5px;color:var(--ink3);margin-top:12px">${T("p5_exact")}</div>
    </div>`;
  }
  return `
  ${kicker("STN 05",T("k5"))}
  <div class="page-head"><div>
    <h1>${T("p5_h")}</h1>
    <p>${T("p5_p")}</p>
  </div></div>
  ${yieldExplainer()}
  <div class="card yield-hero">
    <div class="yh-row">
      <div><div class="yh-label">${T("p5_imp")}</div>
        <div class="yh-big"><span class="yh-plus">+</span><span class="yh-num" id="y-num">0</span></div>
        <div class="yh-note">${T("p5_more")} <b>(+${PLAN_REAL.resumen.mejora_pct}%)</b></div></div>
      <div class="yh-sep"></div>
      <div class="yh-m"><div class="yh-mv" id="y-cod">$0</div><div class="yh-ml">${T("p5_cod")}</div></div>
      <div class="yh-sep"></div>
      <div class="yh-m"><div class="yh-mv" id="y-chg">0</div><div class="yh-ml">${T("p5_chg")}</div></div>
      <div style="margin-left:auto;align-self:flex-end"><span class="ftag"><i>ƒ</i> optimizar_asignacion · MILP</span></div>
    </div>
  </div>
  <div class="card flows" style="animation-delay:.08s">
    <div class="flows-h"><b>${T("p5_flow")}</b><span>${T("p5_flow2")}</span></div>
    ${(PLAN_REAL.recomendaciones || []).slice(0,6).map(px => `
      <div class="flow">
        <div class="flow-z"><b>${escq(px.municipio)} (${escq(px.pais)})</b><small>${px.volumen.toLocaleString("en-US")} ${T("p5_ship")}</small></div>
        <div class="flow-mid">
          <span class="pill" style="color:var(--critical);background:var(--criticalSoft);border-color:#C0322B33">${escq(px.carrier_actual)} · ${px.ef_actual_lcb}%</span>
          <div class="flow-rail"><i></i></div>
          ${ic("arrow",14)}
          <span class="pill" style="color:var(--verified);background:var(--verifiedSoft);border-color:#0C7A5733">${escq(px.carrier_recomendado)} · ${px.ef_recomendada_lcb}%</span>
        </div>
        <div class="flow-c"><div class="flow-ct"><div class="flow-cf" data-c="${px.ef_recomendada_lcb}"></div></div><span class="flow-cp">${Tn("p5_extra", px.entregas_extra_estimadas)}</span></div>
      </div>`).join("")}
    <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
      ${(PLAN_REAL.artefactos || []).filter(a=>a.archivo).map(a => `
        <a class="btn btn-ghost" style="padding:9px 15px;text-decoration:none" href="${API}/artefactos/${encodeURIComponent(a.archivo)}" target="_blank">
          ${ic(a.tipo==="excel"?"sheet":"file",14)} ${a.tipo==="excel"?T("p5_xl"):T("p5_pdf")} ↓</a>`).join("")}
    </div>
  </div>`;
}
async function solveBoard(){
  const card = document.getElementById("solve-card");
  card.innerHTML = `<div class="solver-log">${solverLines().map((l,i) =>
    `<div style="animation-delay:${i*0.42}s" class="${l.startsWith('✓')?'ok':''}">${l}</div>`).join("")}</div>`;
  try{
    PLAN_REAL = await api("/tools/optimizar_asignacion", {timeout:120000});
  }catch(e){
    card.innerHTML = `<div style="color:var(--critical);font-size:13px;padding:8px">${T("p5_unav")}${escq(e.message)}</div>`;
    return;
  }
  if(!PLAN_REAL.ok){ card.innerHTML = `<div style="font-size:13px;padding:8px">${escq(PLAN_REAL.razon || "no result")}</div>`; return; }
  STATE.solved = true;
  cargarLedger();
  renderPage();
}

/* ── 06 CUSTODY ── */
function pageCustody(){
  const entries = LEDGER.map((e,i) => {
    const m = EV_META[e.type];
    const hi = STATE.chainHi && e.chain === STATE.chainHi ? "chain-hi" : "";
    return `<div class="lentry ${hi}" style="animation-delay:${.05+i*.05}s">
      <span class="lt">${e.t}</span>
      <div class="li" style="color:${m.c};border-color:${m.c}44">${ic(m.icon,15)}</div>
      <div class="lb">
        <div class="lt2">${T(m.k)}</div>
        <div class="ld2">${e.d}</div>
        <div class="ltech">
          ${e.tech.split("·").map(s => s.trim()).map(s =>
            s.startsWith("origen_id")
              ? `<button class="origen-chip" onclick="toggleChain('${e.chain}')">${s}</button>`
              : `<span class="plain">${s}</span>`).join("")}
        </div>
        ${e.arts ? `<div class="larts">${e.arts.map(([l,icn,c]) =>
          `<span class="art" style="color:${c};background:${c}10;border-color:${c}30">${ic(icn,11)} ${l}</span>`).join("")}</div>` : ""}
      </div>
    </div>`;
  }).join("");
  return `
  ${kicker("STN 06",T("k6"))}
  <div class="page-head"><div>
    <h1>${T("p6_h")}</h1>
    <p>${T("p6_p")}</p>
  </div></div>
  <div class="card ledger-card">
    <div class="ledger-h"><span class="ld"></span><b>${T("p6_live")}</b><span>${T("p6_ao")}</span></div>
    <div class="chain-note ${STATE.chainHi ? 'on':''}">${ic("link",12)}
      <span>${T("p6_note")}</span>
      <button class="origen-chip" style="margin-left:auto" onclick="toggleChain(null)">${T("p6_clear")}</button>
    </div>
    <div class="ledger">${entries}</div>
  </div>`;
}
function toggleChain(chain){
  STATE.chainHi = (chain && STATE.chainHi !== chain) ? chain : null;
  renderPage();
}
function goChain(chain){ STATE.chainHi = chain || null; goTo("custody"); }

/* ════════ render ════════ */
const PAGES = { patrol:pagePatrol, evidence:pageEvidence, dispatch:pageDispatch, gate:pageGate, yield:pageYield, custody:pageCustody };
function renderPage(){
  const ws = document.getElementById("workspace");
  ws.innerHTML = `<section class="page on">${PAGES[STATE.page]()}</section>`;
  requestAnimationFrame(() => {
    if(STATE.page === "patrol") initGeoMap();
    // animated fills
    document.querySelectorAll(".bfill").forEach(el => setTimeout(() => el.style.width = el.dataset.w+"%", 250));
    document.querySelectorAll(".flow-cf").forEach(el => setTimeout(() => el.style.width = el.dataset.c+"%", 250));
    if(STATE.page === "yield" && STATE.solved && PLAN_REAL){
      const rs = PLAN_REAL.resumen;
      const n = document.getElementById("y-num"); if(n) countUp(n, Math.round(rs.entregas_extra), "", "", 1100);
      const c = document.getElementById("y-cod"); if(c) countUp(c, Math.round(rs.usd_estimados), "$", "", 1100);
      const g = document.getElementById("y-chg"); if(g) countUp(g, rs.zonas_con_cambio, "", "", 1100);
    }
    if(STATE.page === "gate" && STATE.gate === "confirming") tickGate();
  });
}

/* ════════ boot ════════ */
buildMap();
renderLangSw();
traducirChrome();
refreshMapState();
setStatus();
renderPage();
cargarLedger();
cargarPendientes();
setInterval(cargarPendientes, 6000);
setInterval(() => { if(STATE.page === "custody") cargarLedger(); }, 8000);
</script>
</body>
</html>
